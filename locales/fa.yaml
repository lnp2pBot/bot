start: |
  ---———— سلب مسئولیت ————---

  ${disclaimer}

  ---———— شرایط و ضوابط ————---

  این ربات به شما در انجام تراکنش‌های پایاپای روی شبکه لایتنینگ کمک می‌کند.

  پس از راه‌اندازی ربات، می‌توانید از دستورهای زیر استفاده کنید:

  ۱- سفارش خود را با استفاده از دستور /buy (خرید) یا /sell (فروش) منتشر و از دستورالعمل‌هایی که به دنبال آن نمایش داده می‌شوند پیروی کنید.

  ۲- منتظر بمانید تا کاربر دیگری با استفاده از دکمه «خرید» یا «فروش»، درخواست شما را انتخاب کند. همچنین، خودتان می‌توانید سفارش‌های سایر کاربران را با این دکمه‌ها انتخاب کنید!

  ۳- سفارش‌ها و شهرت شما در کانال ${channel} قابل مشاهده خواهند بود.

  ۴- اگر در حال فروش باشید، ربات سفارشتان را در کانال ${channel} منتشر می‌کند تا کاربر دیگری آن را بپذیرد. شما می‌توانید این سفارش فروش را تا *پیش* از آنکه کاربری آن را بپذیرد، با دستور /cancel لغو کنید.

  ۵- پس از آنکه کسی سفارش شما را بپذیرد، ربات از شما خواهد خواست که یک صورتحساب لایتنینگ را پرداخت کنید. این گونه از پرداخت، به صورت امانی نگه داشته و در کیف پول خودتان قفل می‌شوند؛ سفارش پس از گذشت ${orderExpiration} ساعت از زمان پذیرفته شدنش منقضی می‌شود.
  ربات نام کاربری خریدار را فاش می‌کند تا شما بتوانید راهنمایی‌های مربوط به پرداخت فیات را برای او بفرستید. شما باید پس از دریافت فیات، ساتوشی‌ها را با استفاده از دستور /release به خریدار منتقل کنید.

  ۶- اگر قصد خرید دارید، سفارشتان را با دستور /buy منتشر کنید و منتظر بمانید تا فروشنده‌ای آن را بپذیرد. شما می‌توانید این سفارش را هر زمان با استفاده از دستور /cancel لغو کنید.

  ۷- پس از آنکه شخصی سفارش خرید شما را پذیرفت، باید یک صورتحساب لایتنینگ ساخته و آن را برای ربات بفرستید. سپس باید جزئیات پرداخت فیات را از فروشنده خود جویا شوید. پس از پرداخت فیات به فروشنده، باید از دستور /fiatsent استفاده کنید. ربات پس از تأیید از سوی فروشنده، با پرداخت صورتحساب لایتنینگ شما، ساتوشی‌ها را برایتان می‌فرستد.

  ۸- اگر یک سفارش فروش را پذیرفته‌اید (یعنی شما خریدار ساتوشی هستید)، باید یک صورتحساب لایتنینگ بسازید تا ساتوشی‌هایتان را دریافت کنید و از فروشنده جویای جزئیات پرداخت فیات شوید. فروشنده باید پس از دریافت فیات پرداخت شده، از دستور /release برای ارسال شدن ساتوشی‌ها به کیف پول شما استفاده کند.

  ۹- اگر یک سفارش خرید را پذیرفته‌اید (یعنی شما فروشنده ساتوشی هستید)، باید یک صورتحساب لایتنینگ را پرداخت کنید. این ساتوشی‌ها نگه داشته می‌شوند تا خریدار پرداخت فیات را انجام دهد. شما باید اطلاعات مورد نیاز برای انجام پرداخت فیات را در اختیار خریدار قرار دهید. پس از آنکه پرداخت فیات را دریافت نمودید، باید ساتوشی‌های نگه داشته شده توسط ربات را آزاد کنید؛ شما باید از دستور /release استفاده کنید تا ساتوشی‌ها به صورت خودکار به کیف پول خریدار منتقل شوند.

  اطلاعات بیشتر درباره چگونگی استفاده از این ربات را می‌توانید اینجا پیدا کنید 👇

  https://lnp2pbot.com/learn

  معامله سریع و امنی داشته باشید!
init_bot_error: 'برای استفاده از این ربات، باید ابتدا با دستور /start آن را راه‌اندازی کنید.'
non_handle_error: '👤 برای استفاده از این ربات، باید یک نام کاربری تلگرام داشته باشید. جهت فعال‌سازی نام کاربری، وارد منوی تلگرام شده و گزینه تنظیمات --> ویرایش پروفایل --> نام کاربری را انتخاب کنید.'
invoice_payment_request: |
  کاربری قصد خرید ${order.amount}ساتوشی از شما در ازای ${currency} ${order.fiat_amount} را دارد.

  شهرت خریدار: ${rate}

  تعداد روزهای استفاده‌اش از ربات: ${days}

  🚨🚨🚨 *توجه:* 🚨🚨🚨

  *پیش از لمس دکمه «ادامه»، به بالا برگردید و تصویر مربوط به این سفارش را دوباره ببینید*
  با لمس دکمه «ادامه»، یک کد QR حاوی تصویری در مرکز آن خواهید دید؛ پیش از پرداخت صورتحساب، از مطابقت داشتن این دو تصویر اطمینان حاصل کنید.

  *در صورت عدم تطابق، آن صورتحساب از سوی @lnp2pbot نیست. صورتحساب را پرداخت نکنید!*

  تصمیم بگیرید چگونه می‌خواهید ادامه دهید 👇
pending_sell: |
  📝 پیشنهاد در کانال ${channel} منتشر شد.

  منتظر بمانید تا کسی پیشنهاد فروش شما را بپذیرد. اگر سفارشتان تا ${orderExpirationWindow} ساعت آینده پذیرفته نشود، از کانال حذف خواهد شد.

  *🚨 این تصویر را به خاطر بسپارید زیرا آن را دوباره در صورتحسابی که باید پرداخت شود خواهید دید.*

  *توسعه‌دهندگان ‌و داوران حل مشاجره، مسئول هیچ گونه زیان یا آسیبی که کاربر به دلیل عدم پیروی از دستورالعمل‌ها ممکن است متحمل شود نخواهند بود.*

  راه‌اندازی این ربات به معنای پذیرش شرایط و ضوابط استفاده از آن و همچنین سیاست حریم خصوصی آن توسط کاربر است. برای اطلاعات بیشتر، دستور /terms را ارسال کنید.

  شما می‌توانید این سفارش را تا پیش از پذیرفته شدنش توسط دیگران، با اجرای دستور زیر لغو کنید 👇
cancel_order_cmd: '`/cancel ${orderId}`'
pending_buy: |
  📝 پیشنهاد شما برای خرید ساتوشی در کانال ${channel} فعال است.

  باید منتظر بمانید تا کاربر دیگری سفارشتان را بپذیرد؛ این سفارش تا ${orderExpirationWindow} دیگر منقضی می‌شود.

  شما می‌توانید این سفارش را تا پیش از پذیرفته شدنش توسط یک کاربر دیگر، با اجرای دستور زیر لغو کنید 👇
must_be_int: '${fieldName} باید یک عدد باشد.'
must_be_numeric: '${fieldName} باید عدد باشد.'
sats_amount: تعداد ساتوشی
fiat_amount: مقدار فیات
sell_correct_format: |
  /sell \<_sats amount_\> \<_fiat amount_\> \<_fiat code_\> \<_payment method_\> \[_premium/discount_\]

  جهت ایجاد سفارش فروش 1000 ساتوشی در ازای 300 هزار تومان \(IRT\) و اعلام «کارت به کارت» به عنوان روش پرداخت، باید از به کار بردن \<\> و \[\]\ اجتناب کنید.

  `/sell 1000 300000 IRT "کارت به کارت"`

  جهت ایجاد سفارش فروش با نرخ مازاد %3 \(حباب\) باید پارامتر «تعداد ساتوشی» را 0 قرار دهید و عدد 3 را به عنوان آخرین پارامتر بگذارید. ربات نرخ فروش را با استفاده از قیمت بازار بیت‌کوین محاسبه و مازاد تعیین شده را به آن اضافه می‌کند.

  `/sell 0 300000 IRT "payment method" 3`

  برای ایجاد سفارش فروش با بازه مقدار، به جای تعیین مقدار فیات ثابت، می‌توانید حداقل و حداکثر مقدار فیات را تعیین کنید که با خط پیوند \- از هم جدا شده‌اند.

  `/sell 0 300000\-500000 IRT "payment method" 3`
buy_correct_format: |
  /buy \<_sats amount_\> \<_fiat amount_\> \<_fiat code_\> \<_payment method_\> \[_premium/discount_\]

  جهت ایجاد سفارش خرید 1000 ساتوشی در ازای 300 هزار تومان \(IRT\) و اعلام «کارت به کارت» به عنوان روش پرداخت، باید از به کار بردن \<\> و \[\]\ اجتناب کنید.

  `/buy 1000 300000 IRT "کارت به کارت"`

  اگر نمی‌خواهید تعداد ثابت ساتوشی را تعیین کنید و می‌خواهید با قیمتی زیر قیمت بازار بخرید، می‌توانید یک سفارش خرید حاوی تخفیف خاصی را ثبت کنید، چنین نرخی هنگام انتشار سفارشتان به شکل درصد از قیمت بازار کسر می‌شود. برای ثبت چنین سفارشی باید پارامتر «تعداد ساتوشی» را 0 قرار دهید، تا ربات قیمت را محاسبه کند. اگر می‌خواهید با قیمتی %2 زیر قیمت بازار بخرید، باید \-2 را به عنوان آخرین پارامتر بگذارید.

  `/buy 0 300000 IRT "payment method" \-2`

  جهت ایجاد سفارش خرید با بازه مقدار، به جای تعیین مقدار فیات ثابت، می‌توانید حداقل و حداکثر مقدار فیات را تعیین کنید که با خط پیوند \- از هم جدا شده‌اند.

  `/buy 0 300000\-500000 IRT "payment method" \-2`
