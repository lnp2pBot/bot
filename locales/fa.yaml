dispute_started_channel: |
  در یک سفارش ${type}، کاربر @${initiatorUser}(شناسه تلگرام: ${initiatorTgId}) مشاجره‌ای با طرف معامله خود، @${counterPartyUser} (شناسه تلگرام: ${counterPartyUserTgId}) آغاز کرده است. جزئیات سفارش:

  ${detailedOrder}

  رمز فروشنده: ${sellerToken}

  رمز خریدار: ${buyerToken}

  کاربر @${initiatorUser} درگیر ${buyerDisputes} مشاجره بوده است.

  کاربر @${counterPartyUser} درگیر ${sellerDisputes} مشاجره بوده است.
you_started: '🥴 شما مشاجره‌ای در سفارشتان با شناسه `${orderId}` را ثبت کردید.'
counterpart_started: '🥴 طرف معامله شما مشاجره‌ای در سفارشتان با شناسه `${orderId}` را ثبت کرد.'
dispute_started: |
  به زودی از سوی یک داور با شما تماس گرفته خواهد شد؛ به محض واگذاری مشاجره شما به او، ربات نام کاربری او را با شما به اشتراک خواهد گذاشت. او تنها کسی است که می‌تواند به کار شما رسیدگی کند. شما می‌توانید مستقیماً با او تماس بگیرید، اما اگر او ابتدا با شما تماس گرفت، باید از او رمز مشاجره خود را بپرسید و با پاسخش را با رمز مشاجره خود مطابقت دهید:
  `${token}`
must_be_valid_currency: 'نماد فیات باید یک نماد معتبر باشد، مانند: IRT یا USD. لیست کامل فیات‌ها را را دستور /listcurrencies ببینید.'
must_be_number_or_range: |
  مقدار فیات باید یک عدد یا یک بازه عددی به شکل زیر باشد.
  <minimum>-<maximum>
invalid_lightning_address: نشانی لایتنینگ نامعتبر است.
unavailable_lightning_address: 'نشانی لایتنینگ ${la} در دسترس نیست.'
help: |
  /sell <_sats amount_> <_fiat amount_> <_fiat code_> <_payment method_> [premium/discount]
  سفارش فروش ایجاد می‌کند.

  /buy <_sats amount_> <_fiat amount_> <_Fiat code_> <_payment method_> [premium/discount]
  سفارش خرید ایجاد می‌کند.

  /takeorder <_order id_>
  به کاربر این امکان را می‌دهد که یک سفارش را در چت با ربات و بدون مراجعه به کانالی که سفارش در آن منتشر شده بود بپذیرد.

  /info
  اطلاعات بیشتری درباره ربات را نمایش می‌دهد.

  /showusername
  نمایش نام کاربری در هر سفارش جدید را فعال یا غیرفعال می‌کند. مقدار پیش‌فرض روی false (غیرفعال) تنظیم شده است.

  /showvolume
  حجم معاملات در هنگام ایجاد هر سفارش را نمایش می‌دهد. مقدار پیش‌فرض false (عدم نمایش) است.

  /setinvoice
  این دستور به خریدار امکان به‌روزرسانی صورتحساب لایتنینگ دریافت ساتوشی را می‌دهد. 

  /setaddress <_lightning address / off_>
  به خریدار امکان تعیین یک نشانی پرداخت ثابت (نشانی لایتنینگ) را می‌دهد. می‌توانید با مقدار _off_ آن را غیرفعال کنید.

  /setlang
  امکان تغییر زبان را به کاربر می‌دهد.

  /settings
  تنظیمات کنونی کاربر را نمایش می‌دهد.

  /listorders
  از این دستور برای مشاهده لیستی از تمامی سفارش‌ها فعال خود استفاده کنید.

  /listcurrencies
  لیستی از تمامی ارزهای قابل استفاده را بدون نرخ تبدیلشان به ساتوشی نمایش می‌دهد.

  /fiatsent <_order id_>
  خریدار با این دستور اطلاع می‌دهد که پول فیات را به فروشنده ارسال کرده است.

  /release <_order id_>
  فروشنده با این دستور ساتوشی‌ها را آزاد می‌کند.

  /dispute <_order id_>
  مشاجره‌ای بین طرفین معامله را ثبت می‌‌کند.

  /block <_@username/id_>
  مسدود کردن یک کاربر برای جلوگیری از تعامل او با سفارش‌های شما.

  /unblock <_@username/id_>
  رفع مسدودیت یک کاربر.

  /blocklist
  مشاهده لیست کاربران مسدود شده شما.

  /cancel <_order id_>
  سفارشی که هنوز پذیرفته نشده را لغو می‌کند.

  /cancelall
  تمامی سفارش‌های منتشر شده و پذیرفته نشده را لغو می‌کند.

  /terms
  شرایط و ضوابط استفاده از ربات را نمایش می‌دهد.


  Nostr:
  /setnpub <_nostr npub_>
  کلید عمومی نوستر شما را ‌به‌روزرسانی می‌کند. این دستور تنها در حالت راهنما درون /settings قابل اجرا است.

  /nostr
  کلید عمومی نوستر ربات و رله‌های انتشارش را نمایش می‌دهد.


  Communities:
  /community
  ایجاد اجتماع جدید

  /mycomms
   اجتماع‌های ساخته شده توسط شما را نمایش می‌دهد.

  /mycomm <_@community_>
  ورود به راهنمای مدیر اجتماع

  /findcomms <_fiat code_>
  اجتماع‌هایی که با ارز نام برده شده کار می‌کنند را پیدا می‌کند.

  /setcomm <_@groupOfACommunity / off_>
  اجتماع پیش‌فرض را تنظیم، و یا آن را با off حذف می‌کند.

  /settleorder <_order id_>
  پرداخت فروشنده را قبول و ساتوشی‌ها را به صورت خودکار به خریدار می‌فرستد. به یک اجتماع تنظیم شده به عنوان پیش‌فرض نیاز دارد.

  /cancelorder <_id orden_>
  سفارش را لغو و ساتوشی‌ها را به فروشنده بازمی‌گرداند. به یک اجتماع تنظیم شده به عنوان پیش‌فرض نیاز دارد.

  /deldispute <_username_> <_id order_>
  مشاجره‌ای باز شده توسط یک کاربر اجتماع را حذف می‌کند. به یک اجتماع تنظیم شده به عنوان پیش‌فرض نیاز دارد.

  /ban <_username_>
  کاربری را از یک اجتماع محروم می‌کند. به یک اجتماع تنظیم شده به عنوان پیش‌فرض نیاز دارد.

  /unban <_username_>
  به محرومیت یک کاربر از یک اجتماع خاتمه می‌دهد. به یک اجتماع تنظیم شده به عنوان پیش‌فرض نیاز دارد.


  /version
  نسخه کنونی ربات را نمایش می‌دهد.

  /help
  پیام راهنما را نمایش می‌دهد.
