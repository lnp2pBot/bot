privacy: |
  *سیاست حریم خصوصی*

  حریم خصوصی شما برای ما حائز اهمیت است و ما متعهد به حفاظت از اطلاعات شخصی شما هستیم. این سیاست حریم خصوصی توضیح می‌دهد چه اطلاعاتی، چگونه و با چه هدف توسط ما جمع‌‌آوری می‌شوند.
  *۱- اطلاعاتی که ما جمع‌آوری می‌کنیم:*
     - _اطلاعات کاربر:_ نام کاربری و شناسه تلگرام شما که از راه واسط برنامه‌نویسی کاربردی (ای‌پی‌آی) تلگرام به دست آورده می‌شوند.
     - _داده‌های فعالیت ربات:_ شامل تعداد تراکنش‌های انجام شده، تعداد روزهایی که از ربات استفاده کرده‌اید، حجم کل معاملات، امتیاز طرف مقابل و مشاجره‌های ثبت شده، در صورت وجود.
  *۲- استفاده‌ای که از این اطلاعات می‌کنیم:*
     - _سیستم شهرت:_ برای ساختن و نگهداری از سیستم شهرت برای هر کاربر.
     - _حل مشاجره:_ در صورت بروز مشاجره، ما اطلاعات زیر را در اختیار میانجی‌گر (داور) قرار می‌دهیم: نام کاربری شما، شناسه تلگرام، تعداد تراکنش‌های انجام شده، امتیاز طرف مقابل، تعداد روزهای استفاده از ربات و تعداد مشاجره‌های پیشین.
