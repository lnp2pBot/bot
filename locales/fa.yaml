expired_order: |
  این سفارش، بدون انجام شدن، منقضی شد

  ${detailedOrder}

  کاربر @${sellerUser.username} (فروشنده) ${sellerUser.disputes} بار مشاجره داشته است.
  کاربر @${buyerUser.username} (خریدار) ${buyerUser.disputes} بار مشاجره داشته است.
expired_order_to_buyer: |
  🚨🚨🚨 این سفارش در شرف انقضا است و باید هر چه زودتر انجام یا لغو شود؛ اگر هنوز پول فیات را ارسال نکرده‌اید، همچنان می‌توانید با دستور /cancel معامله را لغو کنید.

  اگر پول فیات را ارسال کرده‌اید اما فروشنده ساتوشی‌ها را آزاد نمی‌کند، می‌توانید با دستور /dispute یک مشاجره ثبت کنید. صورتحساب وثیقه‌ای که توسط فروشنده پرداخت شده است، دارای یک تاریخ انقضا می‌باشد و شما باید تا پیش از انقضای آن، تکلیف این سفارش را مشخص کنید وگرنه با خطر از دست دادن پولتان مواجه خواهید شد.

  اگر به کمک نیاز دارید، می‌‌توانید در گروه  ${helpGroup} بنویسید.
expired_order_to_seller: |
  🚨🚨🚨 این سفارش در شرف انقضا است و باید هر چه زودتر انجام یا لغو شود؛ اگر هنوز پول فیات را دریافت نکرده‌اید، همچنان می‌توانید با دستور /cancel معامله را لغو کنید.

  اگر پول فیات را دریافت کرده‌اید، لطفاً ساتوشی‌ها را با دستور /release آزاد کنید وگرنه خطر ثبت مشاجره توسط خریدار را متحمل می‌شوید که روی شهرت شما تأثیر منفی خواهد داشت.

  اگر به کمک نیاز دارید، می توانید پیامتان را در گروه ${helpGroup} بنویسید.
didnt_add_invoice: '🤨 شما صورتحسابی برای دریافت ساتوشی‌های سفارش با شناسه ${orderId} ارسال نکرده‌اید.'
buyer_havent_add_invoice: '😔 خریدار هیچ صورتحسابی برای دریافت ساتوشی‌های سفارش شما با شناسه ${orderId} برای من ارسال نکرد؛ ساتوشی‌های شما به شما بازگردانده شدند.'
buyer_havent_add_invoice_to_admin_channel: 'خریدار @${username} (${tgId}) سفارش با شناسه ${orderId} را برداشت اما صورتحسابی برای دریافت ساتوشی نفرستاد، مهلت ارسال صورتحساب به پایان رسید و سفارش بازنشر شد.'
