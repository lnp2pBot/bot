wizard_community_too_long_name: 'طول نام می‌تواند حداکثر ${length} کاراکتر باشد.'
wizard_community_enter_currency: کد ارزی که کاربران این اجتماع می‌توانند با آن کار کنند را وارد کنید. اگر بیش از یک ارز قابل استفاده است، باید کد ارزها را با یک فاصله خالی از یکدیگر جدا کنید.
wizard_community_enter_group: |
  یک نام یا شناسه برای گروه انتخاب کنید؛ شما و ربات باید هر دو مدیر گروه باشید.
  مثال: @MyCommunity
wizard_community_enter_order_channels: |
  تمام سفارش‌های اجتماع شما باید در یک کانال تلگرام منتشر شوند؛ اگر تنها یک کانال به من معرفی کنید، هم سفارش‌های خرید و هم فروش در آن منتشر خواهند شد.

  اگر دو کانال معرفی کنید، سفارش‌های خرید در یکی از آن‌ها و سفار‌های فروش در دیگری منتشر خواهند شد. شما و ربات باید مدیر هر دو کانال باشید.

  لطفاً نام کانال را به اشتراک بگذارید یا اگر می‌خواهید از دو کانال استفاده کنید، نام هر دو را با یک فاصله خالی بینشان بنویسید.

  مثال:
  @MyCommunitySell @MyCommunityBuy
wizard_community_one_or_two_channels: شما باید یک یا دو کانال معرفی کنید.
wizard_community_enter_solvers: حالا لطفاً نام کاربران حل کننده مشاجره‌ها را با یک فاصله خالی بینشان بنویسید.
wizard_community_must_enter_names: شما باید حداقل یک یا دو نام جدا شده با فاصله را اضافه کنید.
