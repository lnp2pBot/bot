disclaimer: |
  *استفاده شما از این ربات معامله پایاپای، همسان با موافقت شما با شرایط و ضوابط زیر است:*

  این ربات یک نرم‌افزار منبع باز است که برای استفاده، تکثیر، اصلاح و اجرا در دسترس همگان قرار دارد. توسعه‌دهندگان هیچ گونه مسئولیتی در قبال کارهایی که دیگران با استفاده از ربات انجام می‌دهند، شامل کارهای قانونی یا غیرقانونی، صادقانه یا متقلبانه، ندارند.

  این ربات «همان طور که هست» و «در صورت در دسترس بودن» در اختیار کاربران گذاشته می‌شود و توسعه‌دهندگان هیچ گونه ضمانت صریح یا ضمنی در رابطه با ربات و استفاده آن نمی‌کنند.
  
  توسعه‌دهندگان و داوران مشاجره‌ها نهایت تلاش خود را برای جلوگیری از عوامل بد، شیادی و کلاهبرداری در استفاده از ربات خواهند کرد، اما کاربر می‌داند که سیستم می‌تواند مورد سوء استفاده قرار گیرد و هنگام استفاده از آن مسئولیت کامل را می‌پذیرد.
  
  توسعه‌دهندگان و حل‌کنندگان مشاجره‌ها مسئول هیچ زیان یا آسیبی که کاربر ممکن است بر اثر استفاده از این ربات متحمل شود نخواهند بود.
