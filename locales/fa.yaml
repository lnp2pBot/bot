wizard_add_invoice_init: |
  🤖 باید صورتحسابی به مبلغ ${satsAmount} ساتوشی (معادل ${currency} ${fiatAmount}) برای من ارسال کنید تا ساتوشی‌ها را برایتان بفرستم.
  اگر تا ${expirationTime} دقیقه دیگر صورتحساب را ارسال نکنید، سفارش لغو خواهد شد.
wizard_add_invoice_exit: |
  شما از حالت راهنما خارج شدید؛ اکنون می‌توانید دستورها را بنویسید و صورتحساب را با ارسال آن به همراه شناسه سفارش پس از دستور /setinvoice، به سفارش اضافه کنید.
  شما می‌توانید صورتحسابی به مبلغ ${amount} ساتوشی برای من بفرستید، اما من صورتحساب‌های فاقد مقدار مشخص را نیز می‌پذیرم:

  /setinvoice
