  کاربر @${username} یک صورتحساب در انتظار داشت؛ پرداخت سفارش خرید با شناسه ${orderId} به مبلغ ${amount} ساتوشی، بالأخره پس از ${attempts} بار تلاش، با موفقیت انجام شد.

