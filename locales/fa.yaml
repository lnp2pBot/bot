min_expiration_time: 'زمان انقضای صورتحساب باید حداقل ${expirationTime} دقیقه باشد.'
invoice_expired: صورتحساب منقضی شده است.
invoice_expired_long: 'صورتحساب منقضی شده است. شما می‌توانید از دستور زیر جهت ارسال یک صورتحساب جدید به من و دریافت ساتوشی‌ها استفاده کنید 👇'
setinvoice_cmd_order: /setinvoice
invoice_require_destination: صورتحساب نیازمند یک نشانی دریافت‌کننده است.
invoice_require_hash: صورتحساب نیازمند یک هش است.
order_id_invalid: شناسه سفارش، نامعتبر است.
order_invalid_type: 'نوع سفارش ${type}، نامعتبر است.'
order_already_taken: این سفارش توسط کاربر دیگری پذیرفته شده است.
order_already_settled: این سفارش تسویه شده است.
invalid_data: داده‌های نامعتبر فرستادید، دوباره امتحان کنید.
begin_take_buy: |
  🤖 جهت پذیرفتن پیشنهاد، دکمه «ادامه» را لمس کنید. با انتخاب «لغو» از معامله خارج می‌شوید و سفارش دوباره منتشر می‌شود.

  توجه: این تصویر را به خاطر بسپارید زیرا آن را دوباره درون صورتحسابی که باید بپردازید خواهید دید.

  شما ${expirationTime} دقیقه تا انقضای این سفارش فرصت دارید. 👇
continue: ادامه
cancel: لغو
pay_invoice: |
  توجه: پیش از پرداخت صورتحساب، از تطابق تصویر ضمیمه شده با تصویری که هنگام ایجاد سفارش برایتان فرستاده شد اطمینان حاصل کنید.

  جهت شروع فرآیند، این صورتحساب به مبلغ ${amount} ساتوشی برای ${currency} ${fiatAmount} را پرداخت کنید.
payment_received: |
  🤑 پرداخت شد!

  اکنون خریدار باید صورتحسابی برای من بفرستد تا بتوانم ساتوشی‌ها را به کیف پول او منتقل کنم. به محض دریافت صورتحساب خریدار، هر دوی شما را باخبر می‌کنم.

  کمی منتظر بمانید. در صورت عدم همکاری خریدار، وثیقه به شما بازگردانده خواهد شد.
someone_took_your_order: |
  🤖 یک نفر سفارش شما را پذیرفته و ساتوشی‌ها را برای من فرستاده است؛ لطفاً از یک راهکار انتقال وجه فیات که فاقد ریسک مسدود شدن وجه است و به شما امکان ارسال آنی پول را می‌دهد برای پرداخت استفاده کنید.

  اگر پرداخت شما به هر دلیل به تعویق بیفتد به طوری که پول تا ${expirationTime} دیگر به دست فروشنده نرسد، ساتوشی‌ها به فروشنده بازگردانده می‌شوند و شما (خریدار) در معرض خطر از دست دادن پولتان قرار خواهید گرفت. من نمی‌توانم فروشنده را مجبور به فرستادن دوباره ساتوشی‌ها کنم.

  شهرت فروشنده: ${rate}

  تعداد روزهای استفاده‌اش از ربات: ${days}

  در صورت موافقت با شرایط بالا، دکمه زیر را برای ادامه معامله لمس کنید 👇
you_took_someone_order: |
  🤖 شما این سفارش فروش را پذیرفتید؛ لطفاً از یک راهکار انتقال وجه فیات که فاقد ریسک مسدود شدن وجه است و به شما امکان ارسال آنی پول را می‌دهد برای پرداخت استفاده کنید.

  اگر پرداخت شما به هر دلیل به تعویق بیفتد به طوری که پول تا ${expirationTime} دیگر به دست فروشنده نرسد، ساتوشی‌ها به فروشنده بازگردانده می‌شوند و شما (خریدار) در معرض خطر از دست دادن پولتان قرار می‌گیرید. من نمی‌توانم فروشنده را مجبور به فرستادن دوباره ساتوشی‌ها کنم.
  در صورت موافقت با شرایط بالا، دکمه زیر را برای ادامه معامله لمس کنید 👇
get_in_touch_with_seller: |
  🤖 شناسه سفارش: #${orderId}

  برای اطلاع از جزئیات پرداخت، با کاربر @${sellerUsername} (فروشنده) تماس بگیرید. باید ${currency} ${fiatAmount} با استفاده از ${paymentMethod} برای اون بفرستید.

  به محض فرستادن پول، با دستور زیر مرا باخبر کنید 👇
fiatsent_order_cmd: /fiatsent
get_in_touch_with_buyer: |
  🤖 شناسه سفارش: #${orderId}

  با کاربر @${buyerUsername} (خریدار) تماس بگیرید و اطلاعات لازم برای پرداخت ${currency} ${fiatAmount} به شما از طریق ${paymentMethod} را در اختیارش قرار دهید.
  تا زمانی که از پرداخت توسط خریدار اطمینان نیافته‌اید، ساتوشی‌ها را آزاد نکنید.

  شما باید پس از اطمینان یافتن از دریافت پول، ساتوشی‌ها را آزاد کنید.
buyer_took_your_order: |
  🤖 شناسه سفارش: #${orderId}

  کاربر @${buyerUsername} سفارش شما را پذیرفته است و می‌خواهد ساتوشی‌هایتان را بخرد. با او تماس بگیرید و اطلاعات لازم جهت پرداخت ${currency} ${fiatAmount} به شما از طریق ${paymentMethod} را در اختیارش قرار دهید.

  هرگاه خریدار ادعا کند که پول را فرستاده، من به شما اطلاع خواهم داد؛ سپس شما باید دریافت پول را از سمت خودتان بررسی کنید.

  شما امکان لغو یا ثبت مشاجره را در صورت عدم پاسخگویی خریدار خواهید داشت.

  به خاطر داشته باشید که یک مدیر هرگز جهت رسیدگی به سفارشتان با شما تماس نخواهد گرفت مگر آنکه ابتدا یک مشاجره از سوی شما ثبت شده باشد.
waiting_seller_to_pay: 'من یک درخواست پرداخت برای فروشنده فرستادم تا او ساتوشی‌های شما برای سفارشتان با شناسه #${orderId} را بفرستد؛ به محض انجام پرداخت، به هر دوی شما خبر می‌دهم.'
sell_success: 'فروش ساتوشی‌های شما با تأیید پرداخت @${buyerUsername} به پایان رسید ⚡️🍊⚡️'
funds_released: '🕐 فروشنده @${sellerUsername} ساتوشی‌های شما را آزاد کرده است؛ انتظار می‌‌رود صورتحساب شما به زودی پرداخت شود. به خاطر داشته باشید که برای دریافت از طریق لایتنینگ، نرم‌افزار کیف پول شما باید باز بوده و اتصالش به اینترنت برقرار باشد.'
rate_counterpart: 'لطفاً به طرف مقابل خود امتیاز دهید:'
choose_order_for_dispute: 'سفارش مورد نظر برای ثبت مشاجره را انتخاب کنید:'
cant_process_order: این سفارش قابل پردازش نیست، لطفاً درستی شناسه را بررسی کنید.
cant_release_order: ساتوشی‌های این سفارش نمی‌توانند آزاد شوند زیرا خریدار هنوز صورتحسابی برای من نفرستاده است که بتوانم به اون پرداخت کنم.
no_id_related: شما هیچ سفارشی با این شناسه ندارید.
sell_sats: فروختن ساتوشی
buy_sats: خریدن ساتوشی
order_detail: |
  شناسه: ${order._id}

  وضعیت مشاجره پیشین: ${previousDisputeStatus}

  وضعیت: ${status}

  تسویه توسط مدیر: ${settledByAdmin}

  ایجاد کننده: @${creator || ''}

  خریدار: @${buyerUsername || ''}

