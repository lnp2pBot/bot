  در صورت نیاز به کمک می‌توانید به گروه ${helpGroup} پیام دهید.
hold_invoice_expired_to_seller: |
  فاکتور تضمینی سفارش با شناسه ${orderId} قبل از تکمیل معامله منقضی شد. ساتوشی‌های شما به شما بازگردانده شده‌اند.

  در صورت نیاز به کمک می‌توانید به گروه ${helpGroup} پیام دهید.
havent_paid_invoice: '🤨 شما صورتحساب فروش ساتوشی مربوط به سفارش با شناسه ${orderId} را پرداخت نکردید.'
seller_havent_paid_invoice: '😔 فروشنده صورتحساب خرید شما با شناسه {orderId} را پرداخت نکرد و معامله لغو شد.'
seller_havent_add_invoice_to_admin_channel: 'فروشنده @${username} (${tgId}) صورتحساب سفارش با شناسه ${orderId} را پرداخت نکرد، مهلت پرداخت به پایان رسید و سفارش بازنشر شد.'
