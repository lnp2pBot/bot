invalid_lightning_address: Невірна адреса LN
unavailable_lightning_address: Адреса LN ${la} недоступна
help: |
  /sell <_сума у сатоші_> <_сума у валюті_> <_код валюти_> <_метод платежу_> [_премія/дисконт_] - Створити заявку на продаж
  /buy <_сума у сатоші_> <_сума у валюті_> <_код валюти_> <_метод платежу_> [_премія/дисконт_] - Створити заявку на купівлю
  /takeorder <_order id_> - дозволяє користувачеві приймати замовлення з чату з ботом, не переходячи на канал, де воно було опубліковано
  /info - Показати інформацію про Бот
  /showusername - Дозволяє показувати або приховувати ім'я користувача в кожній новій заявці, значення за замовчуванням — ні (false)
  /showvolume - Дозволяє відображати обсяг торгів за кожним новим створеним ордером, за замовчуванням - ні (false)
  /setinvoice - Дозволяє покупцеві поновити рахунок-фактуру Lightning, за якою він отримує сатоші.
  /setaddress <_lightning address / off_> - Дозволяє покупцеві вказати статичну платіжну адресу (lightning address), _off_ - відключено
  /setlang - Дозволяє користувачеві змінювати мову
  /settings - відображає поточні налаштування користувача
  /listorders - Використовуйте цю команду, щоб переглянути всі Ваші транзакції, що очікують на розгляд.
  /listcurrencies - Перелічує всі валюти, які ми можемо використовувати, не вказуючи суми в сатоші
  /fiatsent <_order id_> - Покупець повідомляє, що вже відправив фіатні гроші продавцю
  /release <_order id_> - Розблокувати Сатоші продавцем
  /dispute <_order id_> - Ініціювати спір між учасниками
  /block <_@username/id_> - Заблокувати користувача, щоб він не міг взаємодіяти з вашими замовленнями
  /unblock <_@username/id_> - Розблокувати користувача
  /blocklist - Список ваших заблокованих користувачів
  /cancel <_order id_> - Скасувати заявку до її виконання
  /cancelall - Скасувати всі виставлені заявки
  /terms - Показати умови використання бота

  Nostr:
  /setnpub <_nostr npub_> - Оновлює ваш nostr pubkey, цю команду можна виконати лише в майстрі /settings
  /nostr - показує pubkey nostr бота та ретранслятори, які використовуються для публікації

  Спільноти:
  /community - Створіть нову спільноту
  /mycomms - показує спільноти, які ви створили
  /mycomm <_@community_> - увійдіть у майстер адміністрування спільноти
  /findcomms <_fiat code_> - Знаходить спільноти, які працюють із зазначеною валютою
  /setcomm <_@groupOfACommunity / off_> - Встановіть спільноту за замовчуванням або видаліть її за допомогою "off"
  /settleorder <_order id_> - Прийміть платіж продавця і автоматично надсилайте sats покупцеві, за замовчуванням повинно бути спільнота
  /cancelorder <_id orden_> - Скасовує замовлення, яке повертає sats продавцю, за замовчуванням повинно бути спільнота
  /deldispute <_username_> <_id order_> - Видаляє суперечку користувача в спільноті, за замовчуванням повинно бути спільнота
  /ban <_username_> - Заборона користувача від спільноти, має бути спільнота за замовчуванням
  /unban <_username_> - Розблокувати користувача зі спільноти, має бути спільнота за умовчанням

  /version - Показує поточну версію бота
  /help - Показати ключові команди
