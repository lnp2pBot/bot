disclaimer: |
  *Використовуючи P2P торгового бота, ви погоджуєтеся з наступними умовами та положеннями.*

  Бот - це програмне забезпечення з відкритим вихідним кодом, доступне для використання, копіювання, модифікації та запуску будь-ким. Розробники не несуть відповідальності за дії інших осіб, які використовують програмне забезпечення у будь-який спосіб, законний чи незаконний, чесний чи нечесний.

  Бот надається на умовах "як є" і "як доступно", і розробники не надають жодних гарантій, явних чи неявних, щодо бота або його використання.

  Розробники та особи, які вирішують суперечки, докладають усіх зусиль, щоб усунути недобросовісних учасників, шахраїв та аферистів від використання бота, але користувач визнає, що система може бути використана, і бере на себе повну відповідальність при її використанні.

  Ані розробники, ані сторони, що вирішують спори, не несуть відповідальності за будь-які збитки або шкоду, яких користувач може зазнати в результаті використання бота.
